name: Build and Upload

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for prefix.dev trusted publishing
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install rattler-build
        uses: prefix-dev/rattler-build-action@v0.2.34
        with:
          rattler-build-version: latest

      - name: Build all packages
        run: |
          rattler-build build \
            --recipe-dir recipes \
            -c https://prefix.dev/animovement \
            -c conda-forge \
            --output-dir output

      - name: Upload to prefix.dev
        run: |
          find output -type f \( -name "*.conda" -o -name "*.tar.bz2" \) | while read pkg; do
            echo "Uploading $pkg ..."
            rattler-build upload prefix --channel animovement "$pkg"
          done
